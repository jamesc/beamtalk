<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .frame { fill: #888888; stroke: #888888; stroke-width: 5; stroke-linecap: round; }
    .centre { fill: #1E3A8A; }
    @media (prefers-color-scheme: dark) {
      .frame { fill: #C0C0C0; stroke: #C0C0C0; }
    }
  </style>

  <!-- Diagonal lines -->
  <line x1="39.4" y1="39.4" x2="6" y2="6"   class="frame"/>
  <line x1="60.6" y1="39.4" x2="94" y2="6"  class="frame"/>
  <line x1="60.6" y1="60.6" x2="94" y2="94" class="frame"/>
  <line x1="39.4" y1="60.6" x2="6" y2="94"  class="frame"/>

  <!-- Side lines -->
  <line x1="6" y1="6"   x2="94" y2="6"  class="frame"/>
  <line x1="94" y1="6"  x2="94" y2="94" class="frame"/>
  <line x1="94" y1="94" x2="6" y2="94"  class="frame"/>
  <line x1="6" y1="94"  x2="6" y2="6"   class="frame"/>

  <!-- Central circle -->
  <circle cx="50" cy="50" r="15" class="centre"/>

  <!-- Corner dots -->
  <circle cx="6" cy="6"   r="6" class="frame"/>
  <circle cx="94" cy="6"  r="6" class="frame"/>
  <circle cx="94" cy="94" r="6" class="frame"/>
  <circle cx="6" cy="94"  r="6" class="frame"/>

</svg>
