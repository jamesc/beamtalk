name: Deploy API Docs

on:
  push:
    branches: [main]
    paths:
      - 'stdlib/src/**'
      - 'docs/beamtalk-*.md'
      - 'docs/known-limitations.md'
      - 'docs/images/**'
      - 'crates/beamtalk-cli/src/commands/doc/**'
      - 'crates/beamtalk-cli/src/main.rs'
      - 'crates/beamtalk-core/src/codegen/core_erlang/doc_chunks.rs'
      - 'scripts/install.sh'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: '27.0'
          rebar3-version: '3.27'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-otp-27.0-rebar3-3.27
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-otp-27.0-rebar3-3.27
            ${{ runner.os }}-erlang-otp-27.0-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build compiler
        run: just build-rust

      - name: Build Erlang runtime
        run: just build-erlang

      - name: Build standard library
        run: just build-stdlib

      - name: Generate documentation site
        run: cargo run --bin beamtalk -- doc stdlib/src/ --output _site/ --site --docs-path docs/

      - name: Copy install script to site root
        run: cp scripts/install.sh _site/install.sh

      - name: Write CNAME for custom domain
        run: echo "www.beamtalk.dev" > _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
