name: Deploy API Docs

on:
  push:
    branches: [main]
    paths:
      - 'stdlib/src/**'
      - 'docs/beamtalk-*.md'
      - 'docs/known-limitations.md'
      - 'docs/images/**'
      - 'crates/beamtalk-cli/src/commands/doc/**'
      - 'crates/beamtalk-cli/src/main.rs'
      - 'crates/beamtalk-core/src/codegen/core_erlang/doc_chunks.rs'
      - 'scripts/install.sh'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build compiler
        run: just build-rust

      - name: Build Erlang runtime
        run: just build-erlang

      - name: Build standard library
        run: just build-stdlib

      - name: Generate documentation site
        run: cargo run --bin beamtalk -- doc stdlib/src/ --output _site/ --site --docs-path docs/

      - name: Copy install script to site root
        run: cp scripts/install.sh _site/install.sh

      - name: Write CNAME for custom domain
        run: echo "www.beamtalk.dev" > _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
