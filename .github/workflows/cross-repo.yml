#
# Cross-Repo Package Tests
# =========================
# Builds the Beamtalk compiler from source and tests first-party packages
# extracted to their own repositories (starting with beamtalk-http).
#
# Catches compiler regressions that break downstream packages — these are
# invisible to the main CI since the packages live in separate repos.
#
# Runs on push to main (to catch regressions immediately) and on a nightly
# schedule (to catch issues from upstream dependency changes).
#
# Pattern: add new packages as additional jobs following the beamtalk-http
# template below.

name: Cross-Repo Packages

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'SECURITY.md'
      - '.github/skills/**'
      - '.devcontainer/**'
  schedule:
    # 7am UTC daily (11pm PT, 8am CET) — offset from nightly.yml (6am) to
    # avoid resource contention
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── beamtalk-http ──────────────────────────────────────────────────
  beamtalk-http:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Point to the compiler repo's runtime so the freshly-installed
      # beamtalk binary uses the bundled runtime tools (including rebar3)
      # instead of whatever happens to be available on PATH.
      BEAMTALK_RUNTIME_DIR: ${{ github.workspace }}/runtime
    steps:
      - name: Checkout beamtalk compiler
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Build compiler and stdlib
        run: just build

      - name: Install compiler on PATH
        run: |
          # Make the freshly-built beamtalk binary available system-wide
          # just build produces a debug build
          sudo cp target/debug/beamtalk /usr/local/bin/beamtalk
          beamtalk --version

      - name: Checkout beamtalk-http
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          repository: jamesc/beamtalk-http
          path: _packages/beamtalk-http

      - name: Build beamtalk-http
        working-directory: _packages/beamtalk-http
        run: beamtalk build

      - name: Test beamtalk-http
        working-directory: _packages/beamtalk-http
        run: beamtalk test
