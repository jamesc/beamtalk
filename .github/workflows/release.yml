#
# Compiler/Runtime Release Pipeline
# ===================================
# Builds platform-specific distribution archives bundling Rust binaries and
# Erlang BEAM runtime files, then uploads them to GitHub Releases.
#
# The VS Code extension has its own pipeline (release-vscode.yml) because:
#   1. VS Code Marketplace is a different distribution channel
#   2. Extension versioning may diverge from compiler versioning
#   3. LSP-only bugfixes can ship without a full compiler release
#
# On a full release (tag push), this workflow triggers release-vscode.yml
# via workflow_call to build and publish the extension automatically.
#
# Related: release-vscode.yml (VS Code extension distribution)
# Issue: BT-717

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v0.1.0). Defaults to latest release tag.'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Full distribution (Linux x86_64) ─────────────────────────────────
  linux-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine version
        id: version
        run: scripts/ci/determine-version.sh "${{ github.event_name }}" "${{ github.event.release.tag_name }}" "${{ inputs.tag }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: '27.0'
          rebar3-version: '3.27'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-otp-27.0-rebar3-3.27
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-otp-27.0-rebar3-3.27
            ${{ runner.os }}-erlang-otp-27.0-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build distribution
        run: just dist

      - name: Smoke test
        run: just test-install

      - name: Package tarball
        id: package
        run: scripts/ci/package-release.sh "${{ steps.version.outputs.version }}" linux-x86_64

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.archive }}.sha256" \
            --clobber

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: beamtalk-${{ steps.version.outputs.version }}-linux-x86_64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 7

  # ─── Full distribution (macOS x86_64) ──────────────────────────────────
  macos-x86_64:
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine version
        id: version
        run: scripts/ci/determine-version.sh "${{ github.event_name }}" "${{ github.event.release.tag_name }}" "${{ inputs.tag }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: '27.0'
          rebar3-version: '3.27'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-x86_64-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-otp-27.0-rebar3-3.27
          restore-keys: |
            ${{ runner.os }}-x86_64-erlang-otp-27.0-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build and install distribution
        run: just install dist

      - name: Smoke test
        run: just test-install

      - name: Package tarball
        id: package
        run: scripts/ci/package-release.sh "${{ steps.version.outputs.version }}" macos-x86_64

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.archive }}.sha256" \
            --clobber

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: beamtalk-${{ steps.version.outputs.version }}-macos-x86_64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 7

  # ─── Full distribution (macOS ARM64) ──────────────────────────────────
  macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine version
        id: version
        run: scripts/ci/determine-version.sh "${{ github.event_name }}" "${{ github.event.release.tag_name }}" "${{ inputs.tag }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: '27.0'
          rebar3-version: '3.27'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-arm64-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-otp-27.0-rebar3-3.27
          restore-keys: |
            ${{ runner.os }}-arm64-erlang-otp-27.0-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build and install distribution
        run: just install dist

      - name: Smoke test
        run: just test-install

      - name: Package tarball
        id: package
        run: scripts/ci/package-release.sh "${{ steps.version.outputs.version }}" macos-arm64

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.archive }}.sha256" \
            --clobber

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: beamtalk-${{ steps.version.outputs.version }}-macos-arm64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 7

  # ─── Full distribution (Windows x86_64) ────────────────────────────────
  windows-x86_64:
    # Pin to 2022: erlef/setup-beam@v1 doesn't support win25 (windows-2025) yet
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: scripts/ci/determine-version.sh "${{ github.event_name }}" "${{ github.event.release.tag_name }}" "${{ inputs.tag }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: '27.0'
          rebar3-version: '3.27'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-otp-27.0-rebar3-3.27
          restore-keys: |
            ${{ runner.os }}-erlang-otp-27.0-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build Rust (release)
        run: cargo build --all-targets --release --quiet

      - name: Build Erlang runtime
        shell: bash
        run: cd runtime && rebar3 compile

      - name: Build standard library
        shell: bash
        run: |
          ./target/release/beamtalk.exe build-stdlib

      - name: Smoke test
        shell: bash
        run: |
          ./target/release/beamtalk.exe --version
          ./target/release/beamtalk.exe new smoke_project
          printf 'Object subclass: SmokeTest\n  class run => 21 + 21\n' > smoke_project/src/SmokeTest.bt
          cd smoke_project && ../target/release/beamtalk.exe run SmokeTest run
          echo "Smoke test passed"

      - name: Package zip
        id: package
        shell: bash
        run: scripts/ci/package-release.sh "${{ steps.version.outputs.version }}" windows-x86_64

      - name: Upload release asset
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.archive }}.sha256" \
            --clobber

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: beamtalk-${{ steps.version.outputs.version }}-windows-x86_64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 7

  # ─── Notify beamtalk-uat acceptance gate (BT-2449) ──────────────────────
  # After every platform's release archive is built and uploaded, fire a
  # repository_dispatch into jamesc/beamtalk-uat so the UAT gate (BT-2253)
  # runs against this exact published version. The consumer (BT-2451) listens
  # for the event-type `beamtalk-release` and reads `version` + `tag` from the
  # client-payload.
  #
  # Guarded by `github.event_name == 'release'` — the same condition that gates
  # the real "Upload release asset" steps above — so dry-run / artifact-only
  # invocations (workflow_dispatch) no-op cleanly and never dispatch.
  notify-uat:
    needs: [linux-x86_64, macos-x86_64, macos-arm64, windows-x86_64]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      # Re-resolve version/tag here (each build job computes these in its own
      # runner; this is a separate job, so derive them the same way).
      - name: Determine version
        id: version
        run: scripts/ci/determine-version.sh "${{ github.event_name }}" "${{ github.event.release.tag_name }}" "${{ inputs.tag }}"

      - name: Dispatch UAT gate
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          # UAT_DISPATCH_TOKEN: a PAT / fine-grained token with
          # `contents: write` (i.e. repository_dispatch) scope on
          # jamesc/beamtalk-uat. It must be provisioned separately as a repo
          # secret in this repo's settings — it is NOT GITHUB_TOKEN, which
          # cannot dispatch across repositories.
          token: ${{ secrets.UAT_DISPATCH_TOKEN }}
          repository: jamesc/beamtalk-uat
          event-type: beamtalk-release
          client-payload: |
            {
              "version": "${{ steps.version.outputs.version }}",
              "tag": "${{ steps.version.outputs.tag }}"
            }

  # ─── VS Code extension (delegated to release-vscode.yml) ────────────────
  vscode-extension:
    uses: ./.github/workflows/release-vscode.yml
    with:
      publish: ${{ github.event_name == 'release' }}
    secrets:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

  # ─── LiveView IDE (delegated to liveview-release.yml) ────────────────────
  # Ships the IDE on its own lane (BT-2512): self-contained mix-release archives,
  # uploaded to the GitHub Release on a full release. Independent of the core
  # bundle above — the Elixir/Phoenix toolchain is never added to it.
  liveview-ide:
    uses: ./.github/workflows/liveview-release.yml
    with:
      publish: ${{ github.event_name == 'release' }}
