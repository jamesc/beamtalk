# VS Code Extension Release Pipeline
# ====================================
# Packages a single universal .vsix file and publishes to the VS Code Marketplace.
#
# The extension no longer bundles a platform-specific beamtalk-lsp binary.
# Instead, it discovers beamtalk-lsp at runtime via `beamtalk --print-sysroot`,
# requiring users to have Beamtalk installed on their PATH.
#
# This workflow is separate from the compiler/runtime release (release.yml) because:
#   1. VS Code Marketplace is a different distribution channel
#   2. Extension versioning may diverge from compiler versioning
#   3. LSP-only bugfixes can ship without a full compiler release
#
# Trigger modes:
#   - workflow_call: Invoked by release.yml during a full release (publishes by default)
#   - workflow_dispatch: Manual trigger for independent extension releases
#     (e.g., LSP-only bugfix without a full compiler release)
#
# Related: release.yml (compiler/runtime distribution)
# Issue: BT-1013

name: Release VS Code Extension

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to VS Code Marketplace (otherwise just build .vsix artifact)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      publish:
        description: 'Publish to VS Code Marketplace'
        required: false
        type: boolean
        default: true
    secrets:
      VSCE_PAT:
        required: false

concurrency:
  group: release-vscode-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Package universal VS Code extension ──────────────────────────────
  package-vscode:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      vsix_name: ${{ steps.version.outputs.vsix_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Get extension version
        id: version
        run: |
          VERSION=$(node -p "require('./editors/vscode/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix_name=beamtalk-vscode-$VERSION.vsix" >> "$GITHUB_OUTPUT"

      - name: Build extension
        run: |
          cd editors/vscode
          npm install --quiet
          npm run bundle
          ln -sf ../../LICENSE LICENSE
          npx --yes @vscode/vsce package --out "../../beamtalk-vscode-${{ steps.version.outputs.version }}.vsix"
          rm -f LICENSE

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: beamtalk-vscode-${{ steps.version.outputs.version }}
          path: beamtalk-vscode-${{ steps.version.outputs.version }}.vsix
          retention-days: 7

  # ─── Publish VS Code extension to marketplace ─────────────────────────
  publish-vscode:
    needs: package-vscode
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.publish) ||
      (github.event_name == 'workflow_call' && inputs.publish)
    steps:
      - name: Download VSIX
        uses: actions/download-artifact@v8
        with:
          name: beamtalk-vscode-${{ needs.package-vscode.outputs.version }}

      - name: Upload VSIX to GitHub Release
        if: github.event_name == 'workflow_call'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" \
            "${{ needs.package-vscode.outputs.vsix_name }}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath "${{ needs.package-vscode.outputs.vsix_name }}"
