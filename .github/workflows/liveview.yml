name: LiveView IDE

# Scoped to the editors/liveview Mix project so unrelated PRs don't pay the
# Elixir build cost. Mirrors the editors/vscode split (BT-2401).
on:
  push:
    branches: [main]
    paths:
      - 'editors/liveview/**'
      - '.github/workflows/liveview.yml'
  pull_request:
    branches: [main]
    paths:
      - 'editors/liveview/**'
      - '.github/workflows/liveview.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  liveview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: editors/liveview
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Versions come from the repo-root .tool-versions — the single source of
      # truth shared with mise (dev machines, devcontainer), so CI compiles
      # with the same Erlang/Elixir devs see locally and warnings-as-errors
      # catches the same warnings. Never the distro `elixir` package, which
      # pins an old erlang.
      - name: Install Erlang/OTP + Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Node is build-only: esbuild bundles CodeMirror (BT-2538) into app.js.
      # Version tracks the same repo-root .tool-versions.
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: editors/liveview/assets/package-lock.json

      - name: Cache Mix deps and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            editors/liveview/deps
            editors/liveview/_build
          key: ${{ runner.os }}-liveview-mix-${{ hashFiles('editors/liveview/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-liveview-mix-

      - name: Fetch deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      # Proves the real esbuild + tailwind pipeline (no vendored *.min.js):
      # downloads the standalone binaries, then bundles JS + CSS.
      - name: Install asset toolchain (esbuild + tailwind)
        run: mix assets.setup

      - name: Build assets
        run: mix assets.build

      # Workspace-attach tests are skipped automatically (no BT_WORKSPACE_COOKIE).
      - name: Run tests
        run: mix test
