name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'SECURITY.md'
      - '.github/skills/**'
      - '.devcontainer/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'SECURITY.md'
      - '.github/skills/**'
      - '.devcontainer/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Fast checks on all platforms ──────────────────────────────────────
  check:
    strategy:
      fail-fast: false
      matrix:
        # Pin Windows to 2022: erlef/setup-beam@v1 doesn't support win25 (windows-2025) yet
        os: [ubuntu-latest, macos-latest, windows-2022]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # Node.js only needed on Linux for fmt-check-js (Windows fmt-check skips JS/Erlang checks)
      - name: Setup Node.js
        if: runner.os != 'Windows'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Cache Erlang/rebar3 artifacts (Unix)
        if: runner.os != 'Windows'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Cache Erlang/rebar3 artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/AppData/Local/rebar3
            runtime/_build
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Use toolchain cargo directly (macOS)
        if: runner.os == 'macOS'
        run: |
          TOOLCHAIN_CARGO="$(rustup which cargo)"
          TOOLCHAIN_BIN="$(dirname "$TOOLCHAIN_CARGO")"
          echo "$TOOLCHAIN_BIN" >> "$GITHUB_PATH"
          "$TOOLCHAIN_CARGO" --version

      - name: Build, lint, and fast tests
        # build first so clippy and test-rust reuse its artifacts.
        # Full test-stdlib/test-bunit/test-runtime run only in the Linux-only 'test' job.
        # On Windows, fmt-check skips Erlang/JS checks (platform-agnostic, Linux covers them).
        # lint-workaround-comments (BT-2347 ratchet) is a no-op on Windows and enforces
        # the same allowlist gate here that `just ci` enforces locally (BT-2841).
        run: just build clippy fmt-check test-rust lint-workaround-comments

      - name: Surface parity drift check (BT-2082)
        # Verifies REPL ops × CLI × MCP × LSP coverage matches
        # docs/development/surface-parity.md. Fails fast on inventory drift.
        run: just check-surface-drift

  # ─── Corpus drift check (BT-2737) ──────────────────────────────────────
  # crates/beamtalk-examples/corpus.json is generated from the .bt example/
  # test sources; this fails the PR if it wasn't regenerated after a source
  # change. Rust-only (no Erlang/OTP needed), so it stays fast.
  check-corpus:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check corpus.json is up to date
        run: just check-corpus

  # ─── Full test suite on Linux only (requires Erlang/OTP) ──────────────
  # Split into parallel jobs for faster CI (~5 min wall-clock vs ~16 min sequential).
  # Each job restores Rust + Erlang caches and does a fast incremental build (~40s).
  # Rust unit tests already run in the cross-platform 'check' job above.

  test-beam:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: just build

      - name: Test stdlib (compiled language features)
        run: just test-stdlib

      - name: Test BUnit (TestCase tests)
        run: just test-bunit

      - name: Test examples
        run: just test-examples

  test-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: just build

      - name: Test Erlang runtime (unit tests)
        run: just test-runtime

  test-dialyzer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Cache Dialyzer PLT
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            runtime/_build/default/*_plt
          key: ${{ runner.os }}-dialyzer-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-dialyzer-beam-${{ hashFiles('.tool-versions') }}-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: just build

      - name: Check for Erlang changes
        id: erlang-changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # On push to main, compare with previous commit
            BASE="${{ github.event.before }}"
          else
            # On PR, compare with the merge base against main
            BASE="origin/main"
          fi
          if git diff --name-only "$BASE"...HEAD | grep -qE '^runtime/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dialyzer type checking (Erlang runtime)
        if: steps.erlang-changes.outputs.changed == 'true'
        run: just dialyzer

      - name: Dialyzer spec validation (generated -spec attributes)
        run: just dialyzer-specs

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: just build

      - name: Test workspace integration
        run: just test-integration

      - name: Test MCP server integration
        run: just test-mcp

      - name: Test REPL protocol (full pipeline)
        run: just test-repl-protocol

      # On any failure, surface epmd state + the most recent workspace startup
      # logs. The recurring "REPL did not report port" flake (BT-1599 and its
      # 2026-06 recurrence) means a workspace BEAM node booted but never became
      # healthy — startup.log holds the only crash/hang diagnostics, and they
      # are unrecoverable once the runner is gone.
      - name: Dump workspace startup logs
        if: failure()
        run: |
          epmd -names || true
          # startup.log holds VM boot / -eval crash output; workspace.log holds the
          # OTP logger stream where beamtalk_ws_handler writes session/auth failures
          # (e.g. "Session creation failed"). The "port accepting TCP but WS health
          # check failed" flake (BT-2532) leaves startup.log empty — the real cause
          # is in workspace.log — so dump both.
          for f in $(ls -t "$HOME"/.beamtalk/workspaces/*/startup.log "$HOME"/.beamtalk/workspaces/*/workspace.log 2>/dev/null | head -10); do
            echo "=== $f ==="
            cat "$f"
          done

  test-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: just build

      - name: Test parity (REPL / MCP / CLI / LSP)
        run: just test-parity

      - name: Dump workspace startup logs
        if: failure()
        run: |
          epmd -names || true
          for f in $(ls -t "$HOME"/.beamtalk/workspaces/*/startup.log "$HOME"/.beamtalk/workspaces/*/workspace.log 2>/dev/null | head -10); do
            echo "=== $f ==="
            cat "$f"
          done

  coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      # persist-credentials kept: the step below pushes coverage badges to the `badges` branch.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6 # zizmor: ignore[artipacked]
        with:
          persist-credentials: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          version-file: .tool-versions
          version-type: strict
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**', 'runtime/apps/beamtalk_runtime/include/**') }}-beam-${{ hashFiles('.tool-versions') }}
          restore-keys: |
            ${{ runner.os }}-erlang-${{ hashFiles('runtime/rebar.config') }}-beam-${{ hashFiles('.tool-versions') }}
            ${{ runner.os }}-erlang-beam-${{ hashFiles('.tool-versions') }}-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@789fcf404486ad49a9a91ceb1acfb43caac96664 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov

      # The Erlang runtime + stdlib must be built before `cargo llvm-cov`
      # because some Rust integration tests (e.g. cli_doctor from BT-2084)
      # exec the real `beamtalk` binary against the workspace runtime,
      # which fails fast if stdlib .beam files are missing.
      - name: Build Erlang runtime
        run: just build-erlang

      - name: Build standard library
        run: just build-stdlib

      - name: Generate Rust coverage (Cobertura format for action)
        # Excludes test-harness/build-tooling crates (see `llvm_cov_ignore` in
        # the Justfile) so the badge reflects product-code coverage.
        run: just coverage-rust-cobertura

      - name: Generate Erlang coverage (unit + E2E + stdlib)
        run: just coverage-all

      - name: Rust Coverage Summary
        id: rust_coverage
        continue-on-error: true
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          hide_complexity: true

      - name: Preserve Rust Coverage Report
        run: |
          # Rename Rust coverage report before Erlang step overwrites it
          if [ -f code-coverage-results.md ]; then
            mv code-coverage-results.md rust-coverage-results.md
          fi

      - name: Erlang Coverage Summary
        id: erlang_coverage
        continue-on-error: true
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          # All four runtime apps. bt@* compiled-Beamtalk modules carry no
          # Erlang abstract code and are auto-excluded from cover (BT-1672), so
          # the stdlib XML reports only its hand-written FFI .erl modules.
          filename: 'runtime/_build/test/covertool/beamtalk_runtime.covertool.xml,runtime/_build/test/covertool/beamtalk_workspace.covertool.xml,runtime/_build/test/covertool/beamtalk_stdlib.covertool.xml,runtime/_build/test/covertool/beamtalk_compiler.covertool.xml'
          badge: true
          format: markdown
          output: both
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          thresholds: '60 70'

      - name: Preserve Erlang Runtime Coverage Report
        run: |
          # Rename Erlang coverage report for clarity
          if [ -f code-coverage-results.md ]; then
            mv code-coverage-results.md erlang-coverage-results.md
          fi

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-reports
          path: |
            rust-coverage-results.md
            erlang-coverage-results.md
            runtime/_build/test/cover/index.html
            runtime/_build/test/cover/aggregate/*.html
            coverage.cobertura.xml
            runtime/_build/test/covertool/*.xml
          retention-days: 30

      - name: Add Coverage to Job Summary
        run: |
          echo "## 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rust Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f rust-coverage-results.md ]; then
            cat rust-coverage-results.md >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "![Coverage](${{ steps.rust_coverage.outputs.badge }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ WARNING: Rust coverage report not generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Erlang Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f erlang-coverage-results.md ]; then
            cat erlang-coverage-results.md >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "![Coverage](${{ steps.erlang_coverage.outputs.badge }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ WARNING: Erlang coverage report not generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 **Detailed HTML Reports:** Download the \`coverage-reports\` artifact for per-module breakdowns" >> $GITHUB_STEP_SUMMARY

      - name: Check Coverage Thresholds
        id: rust_thresholds
        continue-on-error: true
        run: |
          # Extract Rust line coverage percentage from CodeCoverageSummary output
          # The action outputs to rust-coverage-results.md (markdown format)
          if [ ! -f rust-coverage-results.md ]; then
            echo "⚠️ WARNING: rust-coverage-results.md not found, skipping threshold check"
            exit 0
          fi
          
          # Extract coverage percentages from markdown format
          # Markdown format: **Summary** | **83%** (1212 / 1460) | **69%** (262 / 378) | 682 | ✔
          # Match both integer (83%) and decimal (83.47%) percentages
          rust_coverage=$(grep -E 'Summary.*\|.*%' rust-coverage-results.md | grep -oE '\*\*[0-9]+(\.[0-9]+)?%\*\*' | head -1 | grep -oE '[0-9]+(\.[0-9]+)?' || echo "0")
          rust_branch=$(grep -E 'Summary.*\|.*%' rust-coverage-results.md | grep -oE '\*\*[0-9]+(\.[0-9]+)?%\*\*' | tail -1 | grep -oE '[0-9]+(\.[0-9]+)?' || echo "0")
          
          echo "Rust Line Coverage: ${rust_coverage}%"
          echo "Rust Branch Coverage: ${rust_branch}%"
          echo "rust_coverage=${rust_coverage}" >> "$GITHUB_OUTPUT"
          
          # Check thresholds using awk for portability (no bc dependency)
          line_check=$(awk -v cov="$rust_coverage" 'BEGIN { if (cov < 70.0) print "FAIL"; else print "PASS" }')
          branch_check=$(awk -v cov="$rust_branch" 'BEGIN { if (cov < 80.0) print "WARN"; else print "PASS" }')
          
          if [ "$line_check" = "FAIL" ]; then
            echo "❌ FAILURE: Rust line coverage ${rust_coverage}% is below 70% threshold"
            exit 1
          fi
          
          if [ "$branch_check" = "WARN" ]; then
            echo "⚠️ WARNING: Rust branch coverage ${rust_branch}% is below 80% threshold"
            echo "This will become a failure in future releases"
          fi
          
          echo "✅ Coverage thresholds met"

      - name: Check Erlang Coverage Thresholds
        id: erlang_thresholds
        continue-on-error: true
        run: |
          if [ ! -f erlang-coverage-results.md ]; then
            echo "⚠️ WARNING: erlang-coverage-results.md not found, skipping threshold check"
            exit 0
          fi
          
          erlang_coverage=$(grep -E 'Summary.*\|.*%' erlang-coverage-results.md | grep -oE '\*\*[0-9]+(\.[0-9]+)?%\*\*' | head -1 | grep -oE '[0-9]+(\.[0-9]+)?' || echo "0")
          erlang_branch=$(grep -E 'Summary.*\|.*%' erlang-coverage-results.md | grep -oE '\*\*[0-9]+(\.[0-9]+)?%\*\*' | tail -1 | grep -oE '[0-9]+(\.[0-9]+)?' || echo "0")
          
          echo "Erlang Line Coverage: ${erlang_coverage}%"
          echo "Erlang Branch Coverage: ${erlang_branch}%"
          echo "erlang_coverage=${erlang_coverage}" >> "$GITHUB_OUTPUT"
          
          line_check=$(awk -v cov="$erlang_coverage" 'BEGIN { if (cov < 50.0) print "FAIL"; else print "PASS" }')
          branch_check=$(awk -v cov="$erlang_branch" 'BEGIN { if (cov < 60.0) print "WARN"; else print "PASS" }')
          
          if [ "$line_check" = "FAIL" ]; then
            echo "❌ FAILURE: Erlang line coverage ${erlang_coverage}% is below 50% threshold"
            exit 1
          fi
          
          if [ "$branch_check" = "WARN" ]; then
            echo "⚠️ WARNING: Erlang branch coverage ${erlang_branch}% is below 60% threshold"
            echo "This will become a failure in future releases"
          fi
          
          echo "✅ Erlang coverage thresholds met"

      - name: Publish coverage badges
        run: |
          # Determine badge colors based on coverage percentage
          badge_color() {
            local cov=$1
            awk -v c="$cov" 'BEGIN {
              if (c >= 80) print "brightgreen"
              else if (c >= 70) print "green"
              else if (c >= 60) print "yellowgreen"
              else if (c >= 50) print "yellow"
              else print "red"
            }'
          }

          RUST_COV="${{ steps.rust_thresholds.outputs.rust_coverage }}"
          ERLANG_COV="${{ steps.erlang_thresholds.outputs.erlang_coverage }}"

          # Guard against missing or non-numeric coverage values
          RUST_MSG="unknown"
          RUST_COLOR="lightgrey"
          ERLANG_MSG="unknown"
          ERLANG_COLOR="lightgrey"

          if echo "$RUST_COV" | grep -Eq '^[0-9]+([.][0-9]+)?$'; then
            RUST_MSG="${RUST_COV}%"
            RUST_COLOR=$(badge_color "$RUST_COV")
          fi

          if echo "$ERLANG_COV" | grep -Eq '^[0-9]+([.][0-9]+)?$'; then
            ERLANG_MSG="${ERLANG_COV}%"
            ERLANG_COLOR=$(badge_color "$ERLANG_COV")
          fi

          # Create badge JSON files (shields.io endpoint format)
          mkdir -p badges
          echo "{\"schemaVersion\":1,\"label\":\"Rust coverage\",\"message\":\"${RUST_MSG}\",\"color\":\"${RUST_COLOR}\"}" > badges/rust-coverage.json
          echo "{\"schemaVersion\":1,\"label\":\"Erlang coverage\",\"message\":\"${ERLANG_MSG}\",\"color\":\"${ERLANG_COLOR}\"}" > badges/erlang-coverage.json

          # Commit to badges branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan badges-tmp
          git rm -rf . > /dev/null 2>&1 || true
          cp -r badges/* .
          rm -rf badges
          git add rust-coverage.json erlang-coverage.json
          git commit -m "Update coverage badges [skip ci]"
          git push origin HEAD:badges --force

      - name: Fail if coverage thresholds not met
        if: steps.rust_thresholds.outcome == 'failure' || steps.erlang_thresholds.outcome == 'failure'
        run: |
          echo "❌ Coverage thresholds not met (see above for details)"
          exit 1
