#
# Nightly Cross-Platform Test Suite + Distribution Builds
# =========================================================
# Runs the full test suite on macOS and Windows to catch platform-specific
# issues that PR CI (Linux + macOS/Windows-minimal) would miss.
#
# After tests pass, builds distribution archives for all platforms and uploads
# them to the rolling "nightly" GitHub Release. install.sh --nightly picks
# these up.
#
# Linux is excluded from testing — it already gets full coverage on every PR
# via ci.yml — but is included for distribution builds.
# Linting (clippy, fmt, dialyzer) is skipped — platform-independent, Linux covers it.
#
# Skips if no commits landed in the last 24 hours.

name: Nightly

on:
  schedule:
    # 6am UTC daily (10pm PT, 7am CET)
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Skip if no recent commits ──────────────────────────────────────
  check-activity:
    runs-on: ubuntu-latest
    outputs:
      has_commits: ${{ steps.check.outputs.has_commits }}
      nightly_date: ${{ steps.meta.outputs.date }}
      nightly_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for commits in last 24h
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          elif git log --since="24 hours ago" --oneline | head -1 | grep -q .; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            echo "No commits in last 24h — skipping nightly run"
          fi

      - name: Nightly metadata
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

  # ─── macOS ARM64 (Apple Silicon) ────────────────────────────────────
  macos:
    needs: check-activity
    if: needs.check-activity.outputs.has_commits == 'true'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          rebar3-version: '3.27'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: nightly-${{ runner.os }}-arm64-erlang-otp-27.0-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**') }}
          restore-keys: |
            nightly-${{ runner.os }}-arm64-erlang-otp-27.0-

      - name: Build
        run: just build

      - name: Test Rust
        run: just test-rust

      - name: Test stdlib
        run: just test-stdlib

      - name: Test BUnit
        run: just test-bunit

      - name: Test Erlang runtime
        run: just test-runtime

      - name: Test workspace integration
        run: just test-integration

      - name: Test MCP server
        run: just test-mcp

      - name: Test E2E
        run: just test-e2e

      - name: Build distribution
        run: just install dist

      - name: Smoke test
        run: just test-install

      - name: Package tarball
        id: package
        run: scripts/ci/package-release.sh nightly macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: beamtalk-nightly-macos-arm64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 7

  # ─── Windows x86_64 (full suite) ───────────────────────────────────
  windows:
    needs: check-activity
    if: needs.check-activity.outputs.has_commits == 'true'
    # Pin to 2022: erlef/setup-beam@v1 doesn't support windows-2025 yet
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          rebar3-version: '3.27'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/AppData/Local/rebar3
            runtime/_build
          key: nightly-${{ runner.os }}-erlang-otp-27.0-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**') }}
          restore-keys: |
            nightly-${{ runner.os }}-erlang-otp-27.0-

      - name: Build
        run: just build

      - name: Test Rust
        run: just test-rust

      - name: Test stdlib
        run: just test-stdlib

      - name: Test BUnit
        run: just test-bunit

      - name: Test Erlang runtime
        run: just test-runtime

      - name: Test workspace integration
        run: just test-integration

      - name: Test MCP server
        run: just test-mcp

      - name: Test E2E
        run: just test-e2e

      - name: Build Rust (release)
        run: cargo build --all-targets --release --quiet

      - name: Build standard library (release)
        shell: bash
        run: ./target/release/beamtalk.exe build-stdlib

      - name: Package zip
        id: package
        shell: bash
        run: scripts/ci/package-release.sh nightly windows-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: beamtalk-nightly-windows-x86_64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 7

  # ─── macOS x86_64 (dist only) ──────────────────────────────────────
  macos-x86_64:
    needs: check-activity
    if: needs.check-activity.outputs.has_commits == 'true'
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          rebar3-version: '3.27'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: nightly-${{ runner.os }}-x86_64-erlang-otp-27.0-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**') }}
          restore-keys: |
            nightly-${{ runner.os }}-x86_64-erlang-otp-27.0-

      - name: Build and install distribution
        run: just install dist

      - name: Smoke test
        run: just test-install

      - name: Package tarball
        id: package
        run: scripts/ci/package-release.sh nightly macos-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: beamtalk-nightly-macos-x86_64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 7

  # ─── Linux x86_64 (dist only, testing covered by PR CI) ────────────
  linux:
    needs: check-activity
    if: needs.check-activity.outputs.has_commits == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          rebar3-version: '3.27'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache Erlang/rebar3 artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/rebar3
            runtime/_build
            ~/.rebar3
          key: nightly-${{ runner.os }}-erlang-otp-27.0-${{ hashFiles('runtime/rebar.config', 'runtime/apps/beamtalk_runtime/src/**') }}
          restore-keys: |
            nightly-${{ runner.os }}-erlang-otp-27.0-

      - name: Build distribution
        run: just dist

      - name: Smoke test
        run: just test-install

      - name: Package tarball
        id: package
        run: scripts/ci/package-release.sh nightly linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: beamtalk-nightly-linux-x86_64
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 7

  # ─── Publish nightly release ────────────────────────────────────────
  publish-nightly:
    needs: [check-activity, macos, macos-x86_64, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Create or update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_DATE: ${{ needs.check-activity.outputs.nightly_date }}
          NIGHTLY_SHA: ${{ needs.check-activity.outputs.nightly_sha }}
        run: |
          # Delete existing nightly release if present
          gh release delete nightly --yes 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true

          # Create new nightly release
          gh release create nightly \
            --title "Nightly Build (${NIGHTLY_DATE}, ${NIGHTLY_SHA})" \
            --notes "Automated nightly build from \`main\` at ${NIGHTLY_DATE}.

          **Commit:** ${NIGHTLY_SHA}
          **Full SHA:** $(git rev-parse HEAD)

          > [!WARNING]
          > Nightly builds are untested beyond the standard test suite. Use \`--nightly\` with install.sh:
          > \`\`\`sh
          > curl -fsSL https://jamesc.github.io/beamtalk/install.sh | sh -s -- --nightly
          > \`\`\`" \
            --prerelease \
            dist-artifacts/*
