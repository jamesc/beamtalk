<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">

  <!-- Diagonal lines from inner corners to outer corners -->
  <line x1="39.4" y1="39.4" x2="6" y2="6"   stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="60.6" y1="39.4" x2="94" y2="6"  stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="60.6" y1="60.6" x2="94" y2="94" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="39.4" y1="60.6" x2="6" y2="94"  stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Side lines -->
  <line x1="6" y1="6"   x2="94" y2="6"  stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="94" y1="6"  x2="94" y2="94" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="94" y1="94" x2="6" y2="94"  stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="6" y1="94"  x2="6" y2="6"   stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Central circle -->
  <circle cx="50" cy="50" r="15"/>

  <!-- Corner dots -->
  <circle cx="6" cy="6"   r="6"/>
  <circle cx="94" cy="6"  r="6"/>
  <circle cx="94" cy="94" r="6"/>
  <circle cx="6" cy="94"  r="6"/>

</svg>
